services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    network_mode: host
    environment:
      - TZ=America/Chicago
      - PLEX_CLAIM=${PLEX_CLAIM}
      - PLEX_UID=1000
      - PLEX_GID=1000
    volumes:
      - ./config:/config
      - ./transcode:/transcode
      - ${MEDIA_PATH}:/data
    restart: unless-stopped
